name: hooks-tests

# Регресс-тесты bash-хуков Claude Code (.claude/hooks/). Детерминированно,
# только bash + jq — реальный Craft не трогается. См. tests/README.md.
on:
  push:
  pull_request:

jobs:
  hooks-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Ensure jq
        run: jq --version || { sudo apt-get update && sudo apt-get install -y jq; }

      - name: Make hooks and runner executable
        run: chmod +x .claude/hooks/*.sh tests/run.sh

      - name: Run hook regression tests
        run: bash tests/run.sh
